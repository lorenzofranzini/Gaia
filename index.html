<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Pong Deluxe</title>
<style>
    body {
        margin: 0;
        background: radial-gradient(circle, #0f172a, #020617);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: Arial, sans-serif;
        color: white;
    }

    canvas {
        border: 2px solid #38bdf8;
        box-shadow: 0 0 20px #38bdf8;
        border-radius: 10px;
    }

    .score {
        position: absolute;
        top: 20px;
        font-size: 2rem;
        letter-spacing: 5px;
        text-shadow: 0 0 10px #38bdf8;
    }
</style>
</head>
<body>

<div class="score" id="score">0 : 0</div>
<canvas id="gameCanvas" width="800" height="500"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let player = {
    x: 10,
    y: canvas.height / 2 - 50,
    width: 10,
    height: 100,
    dy: 0
};

let ai = {
    x: canvas.width - 20,
    y: canvas.height / 2 - 50,
    width: 10,
    height: 100
};

let ball = {
    x: canvas.width / 2,
    y: canvas.height / 2,
    radius: 8,
    speed: 5,
    dx: 5,
    dy: 5
};

let playerScore = 0;
let aiScore = 0;

function drawRect(x, y, w, h, color) {
    ctx.fillStyle = color;
    ctx.fillRect(x, y, w, h);
}

function drawBall() {
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
    ctx.fillStyle = "#38bdf8";
    ctx.shadowBlur = 15;
    ctx.shadowColor = "#38bdf8";
    ctx.fill();
    ctx.closePath();
}

function resetBall() {
    ball.x = canvas.width / 2;
    ball.y = canvas.height / 2;
    ball.dx *= -1;
    ball.dy = 5 * (Math.random() > 0.5 ? 1 : -1);
}

function updateScore() {
    document.getElementById("score").textContent = `${playerScore} : ${aiScore}`;
}

function moveBall() {
    ball.x += ball.dx;
    ball.y += ball.dy;

    // collisione con bordo alto/basso
    if (ball.y + ball.radius > canvas.height || ball.y - ball.radius < 0) {
        ball.dy *= -1;
    }

    // collisione player
    if (
        ball.x - ball.radius < player.x + player.width &&
        ball.y > player.y &&
        ball.y < player.y + player.height
    ) {
        ball.dx *= -1.1;
    }

    // collisione AI
    if (
        ball.x + ball.radius > ai.x &&
        ball.y > ai.y &&
        ball.y < ai.y + ai.height
    ) {
        ball.dx *= -1.1;
    }

    // punto
    if (ball.x < 0) {
        aiScore++;
        updateScore();
        resetBall();
    }

    if (ball.x > canvas.width) {
        playerScore++;
        updateScore();
        resetBall();
    }
}

function moveAI() {
    let center = ai.y + ai.height / 2;
    if (center < ball.y - 10) {
        ai.y += 4;
    } else if (center > ball.y + 10) {
        ai.y -= 4;
    }
}

function update() {
    player.y += player.dy;

    // limiti player
    if (player.y < 0) player.y = 0;
    if (player.y + player.height > canvas.height)
        player.y = canvas.height - player.height;

    moveBall();
    moveAI();
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // linea centrale
    for (let i = 0; i < canvas.height; i += 20) {
        drawRect(canvas.width / 2 - 1, i, 2, 10, "#38bdf8");
    }

    drawRect(player.x, player.y, player.width, player.height, "#38bdf8");
    drawRect(ai.x, ai.y, ai.width, ai.height, "#38bdf8");

    drawBall();
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

// controlli
document.addEventListener("keydown", e => {
    if (e.key === "ArrowUp") player.dy = -6;
    if (e.key === "ArrowDown") player.dy = 6;
});

document.addEventListener("keyup", e => {
    if (e.key === "ArrowUp" || e.key === "ArrowDown") player.dy = 0;
});

updateScore();
gameLoop();
</script>

</body>
</html>
